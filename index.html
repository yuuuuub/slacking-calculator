<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐟 带薪摸鱼计算器</title>
<meta name="description" content="算算你今天摸鱼赚了多少钱，看看能换多少杯奶茶、多少顿火锅">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0eb;--card:#fff;--text:#2d2a26;--text2:#7a7268;
  --accent:#ff6b35;--accent2:#f7931e;--green:#2ecc71;
  --border:#e8e0d5;--shadow:0 4px 24px rgba(0,0,0,.06);
  --radius:20px;--radius-sm:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1816;--card:#252220;--text:#e8e0d5;--text2:#9a9288;
    --border:#3a3430;--shadow:0 4px 24px rgba(0,0,0,.3);
  }
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  min-height:100dvh;padding:16px;
}
.container{max-width:480px;margin:0 auto}
/* Header */
header{text-align:center;padding:32px 0 24px}
header h1{font-size:2rem;font-weight:800;letter-spacing:-0.5px}
header p{color:var(--text2);font-size:0.95rem;margin-top:4px}
.fish{display:inline-block;animation:swim 2s ease-in-out infinite}
@keyframes swim{0%,100%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(4px) rotate(-5deg)}75%{transform:translateX(-4px) rotate(5deg)}}
/* Input Card */
.card{
  background:var(--card);border-radius:var(--radius);
  padding:24px;margin-bottom:16px;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.card-title{font-size:1.05rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.input-group{margin-bottom:16px}
.input-group:last-child{margin-bottom:0}
.input-group label{display:block;font-size:0.85rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.input-row{display:flex;align-items:center;gap:10px}
.input-row input{
  flex:1;padding:12px 16px;border:2px solid var(--border);
  border-radius:var(--radius-sm);font-size:1.1rem;font-weight:600;
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color .2s;
}
.input-row input:focus{border-color:var(--accent)}
.input-row input[type=range]{
  flex:1;padding:0;border:none;accent-color:var(--accent);
  height:6px;cursor:pointer;
}
.unit{font-size:0.9rem;color:var(--text2);font-weight:600;min-width:32px}
.hint{font-size:0.78rem;color:var(--text2);margin-top:4px}

/* 快捷预设 */
.presets{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.preset{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg);color:var(--text2);font-size:0.8rem;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.preset:hover,.preset.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Result */
.result-hero{text-align:center;padding:32px 24px}
.amount{font-size:3.2rem;font-weight:900;letter-spacing:-2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.amount-label{font-size:0.9rem;color:var(--text2)}
.amount-sub{font-size:0.85rem;color:var(--text2);margin-top:4px}
/* equivalents grid */
.equivalents{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.eq-item{
  background:var(--bg);border-radius:var(--radius-sm);padding:14px 12px;
  text-align:center;transition:transform .2s;
}
.eq-item:hover{transform:translateY(-2px)}
.eq-icon{font-size:1.8rem;margin-bottom:2px}
.eq-count{font-size:1.3rem;font-weight:800;color:var(--accent)}
.eq-label{font-size:0.78rem;color:var(--text2)}
/* progress bar */
.fun-fact{
  text-align:center;padding:12px;font-size:0.9rem;color:var(--text2);
  font-style:italic;
}
/* footer */
footer{text-align:center;padding:32px 0;color:var(--text2);font-size:0.8rem}
/* animation */
.fade-in{animation:fadeIn .5s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.scale-in{animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes scaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="fish">🐟</span> 带薪摸鱼计算器</h1>
    <p>算算摸鱼给你赚了多少钱 💰</p>
  </header>

  <!-- 输入区 -->
  <div class="card">
    <div class="card-title">📋 输入你的数据</div>
    <div class="input-group">
      <label>月薪（税前）</label>
      <div class="input-row">
        <input type="number" id="salary" value="15000" min="0" step="100" placeholder="输入月薪">
        <span class="unit">元/月</span>
      </div>
      <div class="presets" id="salaryPresets">
        <button class="preset" data-val="8000">8K</button>
        <button class="preset" data-val="15000">15K</button>
        <button class="preset" data-val="25000">25K</button>
        <button class="preset" data-val="40000">40K</button>
      </div>
    </div>
    <div class="input-group">
      <label>每天工作时间</label>
      <div class="input-row">
        <input type="range" id="workHours" min="4" max="12" step="0.5" value="8">
        <span class="unit" id="workHoursLabel">8h</span>
      </div>
    </div>
    <div class="input-group">
      <label>每天摸鱼时长</label>
      <div class="input-row">
        <input type="range" id="slackHours" min="0.5" max="6" step="0.5" value="2">
        <span class="unit" id="slackHoursLabel">2h</span>
      </div>
      <div class="presets" id="slackPresets">
        <button class="preset" data-val="0.5">偶尔</button>
        <button class="preset active" data-val="2">正常摸</button>
        <button class="preset" data-val="4">深水鱼</button>
        <button class="preset" data-val="6">上班≈摸鱼</button>
      </div>
    </div>
  </div>

  <!-- 结果区 -->
  <div id="result" class="card fade-in">
    <div class="card-title">💰 你的摸鱼收入</div>
    <div class="result-hero">
      <div class="amount-label">今天摸鱼赚了</div>
      <div class="amount" id="dayIncome">¥0</div>
      <div class="amount-sub">
        本月累计：<strong id="monthIncome">¥0</strong>
        &nbsp;|&nbsp; 今年累计：<strong id="yearIncome">¥0</strong>
      </div>
    </div>

    <div class="card-title">🎁 摸鱼收入能换什么</div>
    <div class="equivalents" id="equivalents"></div>

    <div class="fun-fact" id="funFact"></div>
  </div>

  <footer>
    数据仅保存在你的浏览器里 · 摸鱼虽好，可不要贪摸哦 🐟<br>
    <span style="font-size:0.7rem">Powered by Cloudflare Pages</span>
  </footer>
</div>

<script>
const ITEMS=[
  {icon:"🧋",name:"奶茶",unit:"杯",price:15},
  {icon:"☕",name:"咖啡",unit:"杯",price:25},
  {icon:"🍔",name:"汉堡",unit:"个",price:30},
  {icon:"🍱",name:"外卖",unit:"顿",price:35},
  {icon:"🎬",name:"电影票",unit:"张",price:50},
  {icon:"🎮",name:"游戏皮肤",unit:"个",price:100},
  {icon:"🍲",name:"火锅",unit:"顿",price:200},
  {icon:"👟",name:"球鞋",unit:"双",price:800},
];
const FUN_FACTS=[
  m=>`你一个月的摸鱼收入 ≈ ${Math.round(m/200)} 顿火锅，够请全组聚餐了 🍲`,
  m=>`摸鱼一年够买 ${Math.round(m*12/5000)} 次短途旅行，世界那么大 ✈️`,
  m=>`按这个节奏，摸鱼 ${Math.ceil(1000000/m)} 个月就能"赚"到一百万 🎉`,
  m=>`你今天的摸鱼收入已经超过全国 90% 的打工人了 🏆`,
  m=>`温馨提示：用摸鱼赚的钱犒劳自己，才是带薪摸鱼的真谛 😎`,
];

const $=id=>document.getElementById(id);
const salary=$("salary"),workHours=$("workHours"),slackHours=$("slackHours"),
      workHoursLabel=$("workHoursLabel"),slackHoursLabel=$("slackHoursLabel"),
      dayIncome=$("dayIncome"),monthIncome=$("monthIncome"),yearIncome=$("yearIncome"),
      equivalents=$("equivalents"),result=$("result"),funFact=$("funFact");

const WORK_DAYS=22;

function load(){
  const d=localStorage.getItem("slack-calc");
  if(d){const v=JSON.parse(d);salary.value=v.s||15000;workHours.value=v.w||8;slackHours.value=v.l||2;}
}

function save(){
  localStorage.setItem("slack-calc",JSON.stringify({s:salary.value,w:workHours.value,l:slackHours.value}));
}

function fmt(n){return n>=10000 ? (n/10000).toFixed(1)+"万" : n.toFixed(0)}

function calc(){
  const s=parseFloat(salary.value)||0;
  const w=parseFloat(workHours.value)||8;
  const l=parseFloat(slackHours.value)||0;
  const hourly=s/WORK_DAYS/w;
  const day=hourly*l;
  const month=day*WORK_DAYS;
  const year=month*12;

  if(day<1){result.classList.add("hidden");return}
  result.classList.remove("hidden");

  dayIncome.textContent="¥"+day.toFixed(0);
  monthIncome.textContent="¥"+month.toFixed(0);
  yearIncome.textContent="¥"+year.toFixed(0);

  // equivalents (based on monthly)
  equivalents.innerHTML=ITEMS.map(item=>{
    const cnt=month/item.price;
    const show=cnt>=0.1 ? cnt.toFixed(1) : cnt.toFixed(2);
    return `<div class="eq-item scale-in">
      <div class="eq-icon">${item.icon}</div>
      <div class="eq-count">${show}</div>
      <div class="eq-label">${item.unit}${item.name}</div>
    </div>`;
  }).join("");

  funFact.textContent=FUN_FACTS[Math.floor(Math.random()*FUN_FACTS.length)](month);

  save();
}

// events
[salary,workHours,slackHours].forEach(el=>el.addEventListener("input",calc));
workHours.addEventListener("input",()=>{workHoursLabel.textContent=workHours.value+"h";calc()});
slackHours.addEventListener("input",()=>{slackHoursLabel.textContent=slackHours.value+"h";calc()});

// presets
document.getElementById("salaryPresets").addEventListener("click",e=>{
  if(e.target.classList.contains("preset")){
    salary.value=e.target.dataset.val;
    document.querySelectorAll("#salaryPresets .preset").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");calc();
  }
});
document.getElementById("slackPresets").addEventListener("click",e=>{
  if(e.target.classList.contains("preset")){
    slackHours.value=e.target.dataset.val;
    slackHoursLabel.textContent=e.target.dataset.val+"h";
    document.querySelectorAll("#slackPresets .preset").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");calc();
  }
});

load();calc();
</script>
</body>
</html>
